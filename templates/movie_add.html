{% extends "base.html" %}
{% block title %}Add movie – MoviWeb{% endblock %}
{% block content %}
<div class="card">
    <h1>Add movie</h1>
    <p>Enter the name of the movie. The app will fetch other information (year, director, poster, etc.) from OMDb.</p>
    <form method="post" action="{{ url_for('movie_add') }}" class="form">
        <div class="form-group">
            <label for="title">Movie name</label>
            <input type="text" name="title" id="title" placeholder="e.g. The Batman" required autofocus>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Add</button>
            <a href="{{ url_for('movie_list') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

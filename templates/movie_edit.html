{% extends "base.html" %}
{% block title %}Edit movie – MoviWeb{% endblock %}
{% block content %}
<div class="card">
    <h1>Edit movie</h1>
    <form method="post" action="{{ url_for('movie_edit', movie_id=movie.id) }}" class="form">
        <div class="form-group">
            <label for="title">Title</label>
            <input type="text" name="title" id="title" value="{{ movie.title }}" required>
        </div>
        <div class="form-group">
            <label for="year">Year</label>
            <input type="text" name="year" id="year" value="{{ movie.year or '' }}" placeholder="e.g. 2022">
        </div>
        <div class="form-group">
            <label for="director">Director</label>
            <input type="text" name="director" id="director" value="{{ movie.director or '' }}">
        </div>
        <div class="form-group">
            <label for="genre">Genre</label>
            <input type="text" name="genre" id="genre" value="{{ movie.genre or '' }}">
        </div>
        <div class="form-group">
            <label for="plot">Plot</label>
            <textarea name="plot" id="plot" rows="4">{{ movie.plot or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="rating">Rating (0–10)</label>
            <input type="number" name="rating" id="rating" value="{{ movie.rating if movie.rating is not none else '' }}" min="0" max="10" step="0.1" placeholder="e.g. 7.5">
        </div>
        <div class="form-group">
            <label for="note">Note</label>
            <textarea name="note" id="note" rows="2">{{ movie.note or '' }}</textarea>
        </div>
        <div class="form-group">
            <label for="poster_url">Poster URL</label>
            <input type="url" name="poster_url" id="poster_url" value="{{ movie.poster_url or '' }}" placeholder="https://...">
        </div>
        <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{{ url_for('movie_list') }}" class="btn btn-outline">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}

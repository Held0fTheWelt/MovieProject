{% extends "base.html" %}
{% block title %}Select user – MoviWeb{% endblock %}
{% block content %}
<div class="card card-center">
    <h1>Welcome to MoviWeb</h1>
    <p>Select your identity or create a new user.</p>

    <section class="section">
        <h2>Select user</h2>
        <form method="post" action="{{ url_for('user_select') }}">
            <input type="hidden" name="action" value="select">
            <div class="form-group">
                <label for="user_id">User</label>
                <select name="user_id" id="user_id" required>
                    <option value="">-- Please select --</option>
                    {% for u in users %}
                    <option value="{{ u.id }}">{{ u.name }}</option>
                    {% endfor %}
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Log in</button>
        </form>
    </section>

    <section class="section">
        <h2>Create new user</h2>
        <form method="post" action="{{ url_for('user_select') }}">
            <input type="hidden" name="action" value="create">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" name="name" id="name" placeholder="Your name" required autocomplete="name">
            </div>
            <button type="submit" class="btn btn-secondary">Create user</button>
        </form>
    </section>
</div>
{% endblock %}
